		<p>威廉变异(WVAD)</p>
		<p>1.指标说明</p>
		<p>WVAD威廉变异离散量(Williams ’Variable Accumulation/Distribution)由Larry williams所创，是一种将成交量加权的量价指标，该指标将一天中开盘与收盘之间的价位视为参照价位区域，高于此区域为压力区，低于此区域为支撑区，求取此区域占当天总波动的百分比，以便测量当日成交中此区域所占份额。</p>
		<p>2. 应用法则</p>
		<p>a.指标为正值，代表多方的冲力占优势，应买进。</p>
		<p>b.指标为负值，代表空方的冲力占优势，应卖出。</p>
		<p>c.当WVAD由负变正值时，可视为长期买入点。</p>
		<p>d.当WVAD由正变负值时，可视为长期卖出点。</p>
