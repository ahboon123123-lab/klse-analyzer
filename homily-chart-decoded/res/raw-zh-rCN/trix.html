		<p>三重指数平滑移动平均(TRIX)</p>
		<p>1.指标说明</p>
		<p>长线操作时采用本指标的讯号，可以过滤掉一些短期波动的干扰，避免交易次数过于频繁，造成部分无利润的买卖，及手续费的损失。本指标是一项超长周期的指标，长时间按照本指标讯号交易，获利百分比大于损失百分比，利润相当可观。</p>
		<p>2.运用法则</p>
		<p>a.盘整行情本指标不适用。</p>
		<p>b.TRIX向上交叉其MA线，买进。</p>
		<p>c.TRIX向下交叉其MA线，卖出。</p>
		<p>d.TRIX与股价产生背离时，应注意随时会反转。</p>
	</body>
