		<p>指数平均数(EXPMA)</p>
		<p>1.指标说明</p>
		<p>EXPMA指数平均数(Exponential Moving Average)，本指标属于均线型指标。它是因为移动平均线被视为落后指标的缺失而发展出来的，为解决一旦价格已脱离均线差值扩大，而平均线未能立即反应，EXPMA可以减少类似缺点。</p>
		<p>2.应用法则</p>
		<p>a.当短期EXPMA由下往上穿越长期EXPMA时，将对股价造成推升的力道。</p>
		<p>b.当短期EXPMA由上往下穿越长期EXPMA时，将对股价造成下降的力道。</p>
		<p>c. EXPMA跟随股价波动反应快速，用法与移动平均线相同。</p>
	</body>
