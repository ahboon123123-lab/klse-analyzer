		<p>异同离差乖离率(DBCD)</p>
		<p>1.指标说明</p>
		<p>先计算乖离率BIAS，然后计算不同日的乖离率之间的离差，最后对离差进行指数移动平滑处理。</p>
		<p>2.特点</p>
		<p>原理和构造方法和乖离率类似，用法和乖离率相同。优点是能够保持指标的紧密同步，而且线条光滑，信号明确，能够有效的过滤伪信号。</p>
