		<p>红白圈</p>
		<p>1.指标说明</p>
		<p>红白圈属于时间与价格并重的系统，由于组成该指标的每一个点以弧形移动，故又名之为抛物线指标。 </p>
		<p>2.应用法则</p>
		<p>（1）红白圈应用穿越原则。当天的收盘价向下突破红白圈的红圈时作为卖出信号；当天的收盘价向上冲过红白圈的白圈时作为买入信号。</p>
		<p>（2）股价处于横盘整理格局时，慎用红白圈。</p>
		<p>（3）趋势运行方向明显时，红白圈买卖信号相当准确。与DMI指标配合使用，效果更理想。</p>
	</body>
