		<p>红绿灯</p>
		<p>1.指标说明</p>
		<p>红绿灯是一个买点灵敏、卖点略有迟钝的指标，这种买卖点不对称的方法特别适用于大幅度趋势运行的行情，它可以过滤掉很多大幅度趋势运行中易产生错误操作的价格波动。（ </p>
		<p>2.应用法则</p>
		<p>（1）红色K线代表强势区域，绿色K线代表弱势区域</p>
		<p>（2）结合趋向类指标（如弘历彩虹等）使用效果更佳</p>
