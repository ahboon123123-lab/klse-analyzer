		<p>麦克指标(MIKE)</p>
		<p>1.指标说明</p>
		<p>MIKE麦克指标(Mike Base)是另外一种形式的路径指标。依据typical price为计算基准，求其Weak，Medium，Strong三条带动状支撑与压力。</p>
		<p>2. 应用法则</p>
		<p>a. MIKE指标共有六条曲线，上方有三条压力线，下方有三条支撑线。</p>
		<p>b. 当股价往压力线方向涨升时，其下方支撑线不具备参考价值。</p>
		<p>c. 当股价往支撑线方向下跌时，其上方压力线不具备参考价值。</p>
