	<body>
		<p>均差平滑(DMA)</p>
		<p>1.指标说明</p>
		<p>DMA均差平滑(Difference of Moving Average)乃利用两条不同周期的平均线的差值对行情作出判断，其值为10日平均值与50日平均值之差，AMA为DMA之平均值。</p>
		<p>2.应用法则</p>
		<p>a.DMA向上冲破AMA时，行情向上行进，为买入信号。当AMA向下穿破DMA时，行情向下行进，为卖出信号。</p>
		<p>b.DMA也可观察与股价的背离。</p>
	</body>
